<div class="auth-container">

  <!-- LEFT -->
  <div class="left">
    <h1>CoinDash</h1>
    <p>Tradea criptomonedas en tiempo real</p>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <div class="tabs">
      <button (click)="toggle('login')" [class.active]="mode==='login'">
        Login
      </button>
      <button (click)="toggle('register')" [class.active]="mode==='register'">
        Register
      </button>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <input type="email" placeholder="Email" formControlName="email" />

      <input type="password" placeholder="Password" formControlName="password" />

      <button type="submit">
        {{ mode === 'login' ? 'Login' : 'Create account' }}
      </button>

    </form>

    <div style="margin-top: 10px;" id="googleBtn"></div>

  </div>

</div>
