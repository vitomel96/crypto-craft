
    <table mat-table [dataSource]="users" class="mat-elevation-z4 full-width">

      <!-- EMAIL -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let u" >{{ u.email }}</td>
      </ng-container>

      <!-- ROLE -->
      <ng-container matColumnDef="role">
        <th mat-header-cell *matHeaderCellDef>Role</th>
        <td mat-cell *matCellDef="let u">
          <span [ngClass]="u.role === 'admin' ? 'admin' : 'user'">
            {{ u.role }}
          </span>
        </td>
      </ng-container>

      <!-- BALANCE -->
      <ng-container matColumnDef="balance">
        <th mat-header-cell *matHeaderCellDef>
            <span style="text-align: center;">Balance</span></th>
        <td mat-cell *matCellDef="let u">${{ u.balance }} USDT
                 <input style="margin-left: 10px;" matInput type="number" [(ngModel)]="amount[u.id]" placeholder="Monto">
             <button style="margin-left: 10px; padding: 4px!important;" mat-raised-button color="accent"
        
            [disabled]="!amount[u.id]"
            (click)="addBalance(u.id)">
            +
          </button>
        </td>
      </ng-container>

      <ng-container matColumnDef="kyc">
  <th mat-header-cell *matHeaderCellDef>KYC</th>

  <td mat-cell *matCellDef="let u">

    <span [ngClass]="{
      'status-pending': u.kycStatus === 'pending',
      'status-approved': u.kycStatus === 'approved',
      'status-rejected': u.kycStatus === 'rejected'
    }">
      {{ u.kycStatus }}
    </span>

    <!-- SOLO SI ESTA PENDING -->
    <button
      *ngIf="u.kycStatus === 'pending'"
      mat-button
      color="primary"
      (click)="openKyc(u)">
      Ver
    </button>

  </td>
</ng-container>
      <!-- ACTIONS -->
      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Asignar Rol</th>
        <td mat-cell *matCellDef="let u">
          <button mat-button color="primary" (click)="makeAdmin(u.id)" [ngClass]="u.role === 'admin' ? 'isActive' : ''" >Admin</button>
          <button mat-button color="warn" (click)="makeUser(u.id)" [ngClass]="u.role === 'user' ? 'isActive' : ''" >User</button>
     
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="cols"></tr>
      <tr mat-row *matRowDef="let row; columns: cols;"></tr>
    </table>
