
<!-- 🔹 FORM -->
<div class="wallet-form">

  <mat-form-field appearance="outline">
    <mat-label>Network</mat-label>
    <input matInput [(ngModel)]="network">
  </mat-form-field>

  <mat-form-field appearance="outline">
    <mat-label>Address</mat-label>
    <input matInput [(ngModel)]="address">
  </mat-form-field>

  <input type="file" (change)="onFile($event)">

  <button 
    mat-raised-button 
    color="primary"
    (click)="create()">
    Crear Wallet
  </button>

</div>

<!-- 🔹 TABLE -->
<table mat-table [dataSource]="wallets" class="mat-elevation-z4 full-width">

  <!-- NETWORK -->
  <ng-container matColumnDef="network">
    <th mat-header-cell *matHeaderCellDef>Network</th>
    <td mat-cell *matCellDef="let w">{{ w.network }}</td>
  </ng-container>

  <!-- ADDRESS -->
  <ng-container matColumnDef="address">
    <th mat-header-cell *matHeaderCellDef>Address</th>
    <td mat-cell *matCellDef="let w" class="address">
      {{ w.address }}
    </td>
  </ng-container>

  <!-- STATUS -->
  <ng-container matColumnDef="status">
    <th mat-header-cell *matHeaderCellDef>Status</th>
    <td mat-cell *matCellDef="let w">
      <span [ngClass]="w.is_active ? 'status-active' : 'status-rejected'">
        {{ w.is_active ? 'Active' : 'Inactive' }}
      </span>
    </td>
  </ng-container>

<!-- QR -->
<ng-container matColumnDef="qr">
  <th mat-header-cell *matHeaderCellDef>QR</th>

  <td mat-cell *matCellDef="let w">

    <button 
      mat-button 
      color="primary"
      (click)="openQr(w.qr_image_url)"
      [disabled]="!w.qr_image_url">
      Ver
    </button>

  </td>
</ng-container>

  <!-- ACTIONS -->
  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef>Actions</th>
    <td mat-cell *matCellDef="let w">

      <button 
        mat-button 
        color="primary"
        (click)="activate(w.id)"
        [disabled]="w.active">
        {{ w.active ? 'Active' : 'Activate' }}
      </button>

    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="cols"></tr>
  <tr mat-row *matRowDef="let row; columns: cols;"></tr>

</table>
